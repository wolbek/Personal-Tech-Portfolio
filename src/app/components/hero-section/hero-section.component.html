<section id="hero" class="hero" [class.has-theme-bg]="themeService.hasSpecialTheme()">
  <div class="hero__bg">
    <div class="hero__theme-image"></div>
    <div class="hero__theme-overlay"></div>
    <app-three-bg />
    <div class="hero__gradient"></div>
    <div class="hero__grain"></div>
  </div>

  <div class="hero__content">
    <div class="hero__avatar">
      <div class="hero__avatar-ring"></div>
      <div class="hero__avatar-inner">
        <img
          src="profile.jpg"
          alt="Aakash Vishwakarma"
          class="hero__avatar-img"
          (error)="$event.target.style.display = 'none'"
        />
        <span class="hero__avatar-fallback">AV</span>
      </div>
      <div class="hero__avatar-status">
        <span class="status-dot"></span>
      </div>
    </div>
    <p class="hero__greeting">Hello, I'm</p>
    <h1 class="hero__name">{{ info.name }}</h1>
    <div class="hero__tagline-wrapper">
      <p class="hero__tagline">{{ displayedText() }}<span class="cursor">|</span></p>
    </div>

    <div class="hero__actions">
      <button class="btn-primary" (click)="scrollToProjects()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        View My Work
      </button>
      <button class="btn-outline" (click)="scrollToContact()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
          <polyline points="22,6 12,13 2,6" />
        </svg>
        Get in Touch
      </button>
    </div>

    <div class="hero__social">
      @for (link of info.socialLinks; track link.platform) {
        <a
          [href]="link.url"
          [attr.aria-label]="link.label"
          class="social-icon"
          target="_blank"
          rel="noopener"
        >
          @switch (link.icon) {
            @case ('github') {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
                />
              </svg>
            }
            @case ('linkedin') {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"
                />
                <rect x="2" y="9" width="4" height="12" />
                <circle cx="4" cy="4" r="2" />
              </svg>
            }
            @case ('mail') {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                />
                <polyline points="22,6 12,13 2,6" />
              </svg>
            }
          }
        </a>
      }
    </div>
  </div>

  <div class="hero__scroll-indicator">
    <div class="scroll-inner">
      <div class="mouse">
        <div class="mouse__wheel"></div>
      </div>
      <span>Scroll down</span>
    </div>
  </div>
</section>
